<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spicy Lists</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<h2 class="sr-only">Colored dot list builder with editable legend</h2>

<div id="app">
  <div class="top-bar" style="display:flex;flex-direction:row;align-items:center;gap:10px;">
    <div class="premade-wrapper" id="premade-wrapper">
      <button class="premade-folder-btn" id="premade-folder-btn" onclick="pickPremadeFolder()">&#128193; Load presets&#8230;</button>
      <div class="custom-dropdown" id="custom-dropdown" style="display:none;">
        <div class="custom-dropdown-trigger" id="custom-dropdown-trigger" onclick="toggleCustomDropdown()">Load preset&#8230;</div>
        <div class="custom-dropdown-menu" id="custom-dropdown-menu"></div>
      </div>
      <input type="file" id="premade-folder-input" webkitdirectory multiple accept=".json" style="display:none;" onchange="onFolderPicked(this)" />
    </div>
    <button class="btn-global-edit" id="global-edit-btn" onclick="toggleGlobalEdit()">Edit &#x270E;</button>
    <button class="btn-darkmode" id="darkmode-btn" onclick="toggleDark()">Dark</button>
    <button id="share-btn" class="btn-share" onclick="copyShareUrl()" style="margin-left:auto;">Share &#x1F517;</button>
    <button class="btn-export-json" onclick="exportJson()">Export JSON</button>
    <div class="import-json-wrapper" id="import-json-wrapper">
      <button class="btn-import-json" onclick="toggleImportDropdown()">Import JSON &#9662;</button>
      <div class="import-dropdown" id="import-dropdown" style="display:none;">
        <div class="import-dropdown-item" onclick="triggerImportJson('add')">Add to current</div>
        <div class="import-dropdown-item" onclick="triggerImportJson('replace')">Replace all</div>
      </div>
      <input type="file" id="import-json-input" accept=".json" multiple style="display:none;" />
    </div>
    <button class="btn-export" onclick="exportJpg()">Export JPG</button>
  </div>
  <div class="add-list-row" id="add-list-controls" style="display:none;">
    <input type="text" id="new-list-name" placeholder="New list name..." />
    <button onclick="addList()">Add list</button>
  </div>
  <div class="legend-bar" id="legend-bar"></div>
  <div class="lists-grid" id="lists-grid"></div>
</div>

<script src="app.js"></script>
</body>
</html>
